apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: planbsecurity-www
  labels:
    app.kubernetes.io/name: planbsecurity-www
  annotations:
    # Adjust to your ingress controller / cert-manager setup.
    kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
    - host: planbsecurity.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: planbsecurity-www
                port:
                  name: http
  # tls:
  #   - hosts:
  #       - planbsecurity.example.com
  #     secretName: planbsecurity-www-tls
