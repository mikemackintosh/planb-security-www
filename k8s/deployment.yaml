apiVersion: apps/v1
kind: Deployment
metadata:
  name: planbsecurity-www
  labels:
    app.kubernetes.io/name: planbsecurity-www
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: planbsecurity-www
  template:
    metadata:
      labels:
        app.kubernetes.io/name: planbsecurity-www
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: www
          image: loves2splug/planbsecurity-www:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            # nginx-unprivileged needs writable temp + pid dirs when the
            # root filesystem is read-only.
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
