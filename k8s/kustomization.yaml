apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml

# Pin a specific image tag at deploy time, e.g.:
#   kustomize edit set image loves2splug/planbsecurity-www=loves2splug/planbsecurity-www:<sha>
images:
  - name: loves2splug/planbsecurity-www
    newTag: latest
